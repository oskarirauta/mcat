name: "CI build"
run-name: ${{ github.actor }} executed build ${{ inputs.testname }}

on:
  push:
    branches:
      - '**'        # all branches, but NOT tags: a release creates a tag, and CI
                    # is already verified before tagging, so skip the tag build.
  pull_request:
  workflow_dispatch:
    inputs:
      testname:
        default: "manually"
        description: "build title"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    # build inside Alpine container (via docker run, which also sidesteps
    # actions/checkout's glibc node not running on musl).
    - name: make + tests (Alpine)
      run: |
        docker run --rm -v "$PWD":/src -w /src alpine:edge sh -c '
          apk add --no-cache build-base linux-headers &&
          make
        '
